<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Maine Coons in Need">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5aae6a"/>
      <stop offset="1" stop-color="#2a7440"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="16" fill="url(#g)"/>
  <!-- Maine Coon face: broad, with tufted ears -->
  <g fill="#faf7f1">
    <path d="M16 20l3-7 7 5z"/>
    <path d="M48 20l-3-7-7 5z"/>
    <path d="M32 18c-9 0-15 6-15 15 0 9 6 16 15 16s15-7 15-16c0-9-6-15-15-15z"/>
  </g>
  <!-- ear tufts -->
  <g stroke="#1f4a2d" stroke-width="1.4" stroke-linecap="round">
    <path d="M20 13l-1-4M22 14l1-4"/>
    <path d="M44 13l1-4M42 14l-1-4"/>
  </g>
  <!-- eyes -->
  <g fill="#2a7440">
    <ellipse cx="26" cy="31" rx="2.6" ry="3.4"/>
    <ellipse cx="38" cy="31" rx="2.6" ry="3.4"/>
  </g>
  <!-- nose + mouth -->
  <path d="M32 36l-2.4 2.4h4.8z" fill="#f25c0a"/>
  <path d="M32 39c-2 2-4 1.5-5 0M32 39c2 2 4 1.5 5 0" fill="none" stroke="#2a7440" stroke-width="1.4" stroke-linecap="round"/>
  <!-- whiskers -->
  <g stroke="#2a7440" stroke-width="1.2" stroke-linecap="round" opacity="0.8">
    <path d="M24 38l-8 -1M24 40l-7 2M40 38l8 -1M40 40l7 2"/>
  </g>
</svg>
